name: Supabase Keepalive

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keepalive endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "apikey: ${{ secrets.TRADERS_MARKET_SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TRADERS_MARKET_SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.NEXT_PUBLIC_TRADERS_MARKET_SUPABASE_URL }}/rest/v1/rpc/keepalive_ping")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Keepalive ping failed with status $STATUS"
            exit 1
          fi
